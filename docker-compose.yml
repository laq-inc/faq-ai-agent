services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:3000:3000"
    volumes:
      - .:/app
      - codex_auth:/root/.codex
      - claude_config:/root/.claude
      - ./.devcontainer/claude-home/claude.json:/root/.claude.json
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - PYTHONPATH=/app/backend
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  codex_auth:
  claude_config:
  
secrets:
  postgres_password:
    file: ./.secrets/postgres_password